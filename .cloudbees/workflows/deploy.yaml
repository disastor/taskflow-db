apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: deploy

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
      artifact-id:
        type: string
        required: true
      version:
        type: string
        required: true

jobs:
  deploy:
    steps:
      - name: "Deploy DB"
        uses: docker://alpine:latest
        run: |
          echo "Deploying docker.io/mock/database:${{ inputs.version }} to ${{ inputs.environment }}"
          # Replace with a real deploy step for your infrastructure.

      - name: Register deployed artifact
        uses: cloudbees-io/register-deployed-artifact@v2
        with:
          artifact-id: ${{ inputs.artifact-id }}
          target-environment: ${{ inputs.environment }}
